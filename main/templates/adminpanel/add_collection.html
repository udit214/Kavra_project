{% extends 'adminpanel/base.html' %}

{% block content %}
<div class="p-4 md:p-8 max-w-4xl mx-auto">
    <h1 class="text-xl md:text-2xl font-luxury gold-text uppercase tracking-widest mb-6 md:mb-8 text-center md:text-left">
        Create Collection
    </h1>
    
    <form method="POST" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}
        
        <section class="card p-5 md:p-8 space-y-6 bg-[#0a0a0a] border border-white/5 rounded-sm">
            
            <div class="flex flex-col gap-2">
                <label class="text-[9px] md:text-[10px] uppercase tracking-widest text-gray-500 font-semibold">
                    Collection Name
                </label>
                <input type="text" name="name" required 
                    class="bg-black border border-white/10 p-3 md:p-4 outline-none focus:border-[#d4af37] transition text-sm text-white rounded-none appearance-none">
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-[9px] md:text-[10px] uppercase tracking-widest text-gray-500 font-semibold">
                    Description
                </label>
                <textarea name="description" rows="4" 
                    class="bg-black border border-white/10 p-3 md:p-4 outline-none focus:border-[#d4af37] transition text-sm text-white rounded-none appearance-none"></textarea>
            </div>

            <div class="flex flex-col gap-3">
                <label class="text-[9px] md:text-[10px] uppercase tracking-widest text-gray-500 font-semibold">
                    Cover Image
                </label>
                <div class="bg-black border border-dashed border-white/10 p-4 transition-all hover:border-[#d4af37]/50">
                    <input type="file" name="image" 
                        class="block w-full text-[10px] text-gray-500
                        file:mr-4 file:py-2 file:px-4
                        file:border-0 file:text-[10px] file:uppercase 
                        file:gold-bg file:text-black file:font-bold 
                        file:cursor-pointer hover:file:opacity-90">
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" 
                    class="w-full py-4 gold-bg text-black font-bold uppercase tracking-[0.2em] text-[11px] md:text-xs transition-all active:scale-[0.98]">
                    Initialize Collection
                </button>
            </div>
            
        </section>
    </form>
</div>
{% endblock %}
