{% extends 'adminpanel/base.html' %}

{% block content %}
<div class="p-8 max-w-4xl">
    <h1 class="text-2xl font-luxury gold-text uppercase tracking-widest mb-8">Create Collection</h1>
    
    <form method="POST" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}
        <section class="card p-8 space-y-6">
            <div class="flex flex-col gap-2">
                <label class="text-[10px] uppercase tracking-widest text-gray-500">Collection Name</label>
                <input type="text" name="name" required class="bg-black border border-white/10 p-4 outline-none focus:border-gold transition">
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-[10px] uppercase tracking-widest text-gray-500">Description</label>
                <textarea name="description" rows="5" class="bg-black border border-white/10 p-4 outline-none focus:border-gold transition"></textarea>
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-[10px] uppercase tracking-widest text-gray-500">Cover Image</label>
                <input type="file" name="image" class="text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:border-0 file:text-[10px] file:uppercase file:gold-bg file:text-black file:font-bold">
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full py-4 gold-bg text-black font-bold uppercase tracking-[0.3em] text-xs">Initialize Collection</button>
            </div>
        </section>
    </form>
</div>
{% endblock %}
