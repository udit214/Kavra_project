{% extends 'adminpanel/base.html' %}

{% block content %}
<div class="p-8">
    <div class="flex justify-between items-center mb-10">
        <h1 class="text-2xl font-luxury gold-text uppercase tracking-widest">Manage Collections</h1>
        <a href="{% url 'add_collection' %}" class="px-6 py-2 gold-bg text-black font-bold text-[10px] uppercase tracking-widest shadow-lg">Add New Collection</a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for col in collections %}
        <div class="card overflow-hidden group">
            <div class="aspect-[4/5] overflow-hidden bg-neutral-900">
                {% if col.image %}
                    <img src="{{ col.image.url }}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                {% endif %}
            </div>
            <div class="p-6 border-t border-white/5">
                <h3 class="font-luxury text-lg mb-1 uppercase tracking-wider">{{ col.name }}</h3>
                <p class="text-[10px] text-gray-500 mb-4 italic">{{ col.slug }}</p>
                <div class="flex justify-between">
                    <a href="{% url 'edit_collection' col.id %}" class="text-[10px] uppercase tracking-widest text-gray-400 hover:text-white transition">Edit</a>
                    <a href="{% url 'delete_collection' col.id %}" class="text-[10px] uppercase tracking-widest text-red-500 hover:underline">Remove</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
