<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAVRA | Security Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&display=swap');
        :root { --gold: #d4af37; --black: #050505; }
        body { font-family: 'Inter', sans-serif; background-color: var(--black); color: white; overflow-x: hidden; }
        .font-luxury { font-family: 'Playfair+Display', serif; }
        .gold-glow:focus { box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); border-color: var(--gold); }
        
        /* Smooth transition for eye icon */
        #eye-icon { transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-sm p-6 md:p-8 border border-gray-900 bg-[#0a0a0a] rounded-2xl shadow-2xl">
        <div class="text-center mb-10">
            <h1 class="font-luxury text-4xl tracking-tighter text-[#d4af37]">KAVRA</h1>
            <div class="h-[1px] w-12 bg-[#d4af37] mx-auto mt-2"></div>
            <p class="text-[10px] uppercase tracking-[0.4em] mt-4 text-gray-500 font-semibold">Security Portal</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            {% if messages %}
                <div class="space-y-2">
                    {% for message in messages %}
                        <p class="text-red-500 text-[10px] text-center uppercase tracking-widest italic">{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}

            <div>
                <input type="text" name="username" placeholder="IDENTIFIER" required
                    autocapitalize="none" 
                    autocorrect="off" 
                    spellcheck="false"
                    class="w-full bg-black border border-gray-800 py-3 px-4 text-xs tracking-widest uppercase text-white focus:outline-none gold-glow transition-all rounded-none appearance-none">
            </div>

            <div class="relative">
                <input type="password" id="password" name="password" placeholder="PASSPHRASE" required
                    autocapitalize="none" 
                    autocorrect="off" 
                    spellcheck="false"
                    class="w-full bg-black border border-gray-800 py-3 px-4 pr-12 text-xs tracking-widest uppercase text-white focus:outline-none gold-glow transition-all rounded-none appearance-none">
                
                <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-600 hover:text-[#d4af37] transition-colors focus:outline-none">
                    <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>

            <button type="submit" 
                class="w-full bg-[#d4af37] text-black py-4 text-[10px] font-bold uppercase tracking-[0.3em] hover:bg-[#b8860b] transition-colors duration-300 active:scale-[0.98]">
                Authorize Access
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="/" class="text-[9px] text-gray-600 uppercase tracking-widest hover:text-gray-400 transition-colors">Return to Archive</a>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                `;
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                `;
            }
        }
    </script>
</body>
</html>
