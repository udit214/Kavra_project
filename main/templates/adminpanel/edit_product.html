{% extends 'adminpanel/base.html' %}

{% block title %}Edit Piece | KAVRA Admin{% endblock %}

{% block content %}
<main class="p-8 max-w-4xl">
    <header class="mb-10">
        <a href="{% url 'inventory' %}" class="text-[10px] uppercase tracking-widest text-gray-500 hover:text-gold transition">← Back to Warehouse</a>
        <h1 class="text-2xl font-semibold uppercase tracking-tight mt-4">Edit Product: {{ product.name }}</h1>
    </header>

    <form method="POST" enctype="multipart/form-data" class="space-y-8">
        {% csrf_token %}
        
        <section class="card p-8 space-y-6 bg-neutral-900/50 border border-white/5">
            <h3 class="text-[10px] uppercase tracking-[0.2em] gold-text font-bold">Core Details</h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] uppercase text-gray-500">Product Name</label>
                    <input type="text" name="name" value="{{ product.name }}" required>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] uppercase text-gray-500">Base SKU</label>
                    <input type="text" name="sku" value="{{ product.sku_base }}" required>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] uppercase text-gray-500">Price ($)</label>
                    <input type="number" step="0.01" name="price" value="{{ product.price }}" required>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] uppercase text-gray-500">Collection</label>
                    <select name="collection">
                        {% for col in collections %}
                            <option value="{{ col.id }}" {% if col == product.collection %}selected{% endif %}>{{ col.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-[10px] uppercase text-gray-500">Description</label>
                <textarea name="description" rows="4">{{ product.description }}</textarea>
            </div>
        </section>

        <section class="card p-8 space-y-6 bg-neutral-900/50 border border-white/5">
            <h3 class="text-[10px] uppercase tracking-[0.2em] gold-text font-bold">Stock Inventory (Size Breakdown)</h3>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] text-center text-gray-500">SMALL</label>
                    <input type="number" name="stock_s" value="{{ stock_s }}" class="text-center" min="0">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] text-center text-gray-500">MEDIUM</label>
                    <input type="number" name="stock_m" value="{{ stock_m }}" class="text-center" min="0">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] text-center text-gray-500">LARGE</label>
                    <input type="number" name="stock_l" value="{{ stock_l }}" class="text-center" min="0">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] text-center text-gray-500">X-LARGE</label>
                    <input type="number" name="stock_xl" value="{{ stock_xl }}" class="text-center" min="0">
                </div>
            </div>
        </section>

        <section class="card p-8 space-y-6 bg-neutral-900/50 border border-white/5">
            <h3 class="text-[10px] uppercase tracking-[0.2em] gold-text font-bold">Media Assets</h3>
            <div class="flex items-center gap-6">
                {% if product.image %}
                    <img src="{{ product.image.url }}" class="w-24 h-32 object-cover rounded border border-white/10">
                {% endif %}
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] uppercase text-gray-500">Replace Image</label>
                    <input type="file" name="image" class="border-none bg-transparent">
                </div>
            </div>
        </section>

        <div class="flex justify-end gap-4">
            <button type="submit" class="px-10 py-3 gold-bg text-black font-bold text-[10px] uppercase tracking-widest hover:brightness-110 shadow-lg shadow-gold/10 transition">
                Update Product & Stock
            </button>
        </div>
    </form>
</main>

<style>
    input, select, textarea { 
        background-color: #0F0F0F !important; 
        border: 1px solid rgba(255,255,255,0.1) !important;
        color: white !important;
        padding: 12px 16px !important;
        font-size: 0.75rem;
        outline: none;
    }
    input:focus { border-color: #D4AF37 !important; }
    .gold-bg { background-color: #D4AF37; }
    .gold-text { color: #D4AF37; }
</style>
{% endblock %}
